# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name repairpic.lstcloud.com;

    # acme.sh webroot validation
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name repairpic.lstcloud.com;

    # SSL certificates (managed by acme.sh)
    ssl_certificate     /etc/nginx/ssl/repairpic.lstcloud.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/repairpic.lstcloud.com/privkey.pem;

    # SSL settings
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Admin web static files
    root /www/PictureRepair/admin-web/dist;
    index index.html;

    # Admin web SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 20m;
    }
}
