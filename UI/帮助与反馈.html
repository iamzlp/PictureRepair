<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
        }
        .grain-overlay {
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDklRL8ElBBC8gWqBHxNoLBPRzVedRV24RUW06-9qDei5dlJ1EVyDdUox0AbE1UKaY2zep3ODzR4PLMX5KIqyHuz9NAhC0aNHG0_4FbtxXQWetAaifof0h4Onr8lM8i6RKzkxd4Yho8F7FbQoHe9sz-0AVaUfnXsm2XszyFHtUEa9Q61tHdwfRNes9gUlZfePBIz8wh9k07Wa56pSdg8qLYCkUzJcDULJ78X8x0C8dE26sLO7CTxXDOT0sMwqBdpWfebhU_Hk9FKn74);
            opacity: 0.03;
            pointer-events: none
        }
        .sepia-shadow {
            box-shadow: 0 4px 15px rgba(68, 42, 34, 0.08)
        }
        /* WeChat-like input styling */
        .wx-input-group {
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
        }
        .wx-input-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid #f0eded;
        }
        .wx-input-item:last-child {
            border-bottom: none;
        }
        .wx-label {
            width: 80px;
            font-size: 14px;
            color: #1b1c1c;
        }
        .wx-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            padding: 0;
            background: transparent;
        }
        .wx-input:focus {
            ring: 0;
            box-shadow: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#d4ada1",
                        "surface-dim": "#dcd9d9",
                        "primary-fixed-dim": "#e7bdb1",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#2c160e",
                        "surface-tint": "#77574d",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "tertiary": "#002e68",
                        "primary-container": "#5d4037",
                        "surface": "#fcf9f8",
                        "surface-container-highest": "#e4e2e1",
                        "on-surface": "#1b1c1c",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#5e604d",
                        "inverse-surface": "#303030",
                        "secondary-fixed": "#e4e4cc",
                        "tertiary-container": "#004493",
                        "on-secondary-container": "#636451",
                        "on-tertiary-container": "#90b5ff",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e4e2e1",
                        "primary": "#442a22",
                        "on-tertiary-fixed": "#001a41",
                        "inverse-primary": "#e7bdb1",
                        "secondary-container": "#e1e1c9",
                        "outline": "#827470",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#474836",
                        "primary-fixed": "#ffdbd0",
                        "on-tertiary-fixed-variant": "#004493",
                        "outline-variant": "#d4c3be",
                        "background": "#fcf9f8",
                        "on-primary-fixed-variant": "#5d4037",
                        "tertiary-fixed": "#d8e2ff",
                        "on-secondary-fixed": "#1b1d0e",
                        "surface-container": "#f0eded",
                        "on-surface-variant": "#504441",
                        "inverse-on-surface": "#f3f0f0",
                        "tertiary-fixed-dim": "#adc7ff",
                        "surface-bright": "#fcf9f8",
                        "surface-container-high": "#eae7e7",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#c8c8b0",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f6f3f2",
                        "on-background": "#1b1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "margin-page": "20px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "stack-lg": "24px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Newsreader"],
                        "label-sm": ["Manrope"],
                        "body-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "headline-lg-mobile": ["Newsreader"],
                        "headline-lg": ["Newsreader"],
                        "headline-sm": ["Newsreader"],
                        "label-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["26px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["30px", {"lineHeight": "38px", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "label-lg": ["14px", {"lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col relative">
<div class="fixed inset-0 grain-overlay z-0"></div>
<!-- 顶部导航栏 -->
<header class="bg-surface-container-low sticky top-0 z-40 flex justify-between items-center w-full px-margin-page h-16 border-b border-outline-variant/30 sepia-shadow">
<button class="w-10 h-10 flex items-center justify-center text-primary active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary font-semibold">帮助与反馈</h1>
<div class="w-10"></div>
</header>
<main class="flex-grow z-10 px-margin-page py-stack-lg max-w-2xl mx-auto w-full space-y-stack-lg">
<!-- 引导头部 -->
<section class="text-center space-y-stack-sm pb-stack-md">
<div class="w-20 h-20 bg-primary-fixed rounded-full flex items-center justify-center mx-auto mb-stack-md sepia-shadow">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">help_center</span>
</div>
<h2 class="font-headline-md text-headline-md text-primary">我们能帮您什么？</h2>
<p class="font-body-md text-on-surface-variant max-w-xs mx-auto">浏览常见问题或直接向我们发送反馈建议。</p>
</section>
<!-- 常见问题 -->
<section class="space-y-stack-md">
<h3 class="font-label-lg text-label-lg text-primary uppercase tracking-widest flex items-center gap-2">
<span class="w-8 h-[1px] bg-outline-variant"></span>
                常见问题
            </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- FAQ Item 1 -->
<div class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-stack-md sepia-shadow hover:bg-surface-bright transition-colors cursor-pointer group">
<div class="flex items-start gap-stack-sm">
<span class="material-symbols-outlined text-primary mt-1">auto_fix_high</span>
<div class="space-y-1">
<h4 class="font-label-lg text-label-lg text-primary group-hover:underline">如何上传照片？</h4>
<p class="font-body-md text-on-surface-variant text-sm">选择“修复”功能，点击中心框选区域即可从相册选取。</p>
</div>
</div>
</div>
<!-- FAQ Item 2 -->
<div class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-stack-md sepia-shadow hover:bg-surface-bright transition-colors cursor-pointer group">
<div class="flex items-start gap-stack-sm">
<span class="material-symbols-outlined text-primary mt-1">payments</span>
<div class="space-y-1">
<h4 class="font-label-lg text-label-lg text-primary group-hover:underline">支付问题？</h4>
<p class="font-body-md text-on-surface-variant text-sm">请检查微信支付历史记录，或在账号页面尝试恢复购买。</p>
</div>
</div>
</div>
<!-- FAQ Item 3 -->
<div class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-stack-md sepia-shadow hover:bg-surface-bright transition-colors cursor-pointer group">
<div class="flex items-start gap-stack-sm">
<span class="material-symbols-outlined text-primary mt-1">history</span>
<div class="space-y-1">
<h4 class="font-label-lg text-label-lg text-primary group-hover:underline">我的修复记录在哪？</h4>
<p class="font-body-md text-on-surface-variant text-sm">您可以在“相册”标签页查看所有之前修复过的图片。</p>
</div>
</div>
</div>
<!-- FAQ Item 4 -->
<div class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-stack-md sepia-shadow hover:bg-surface-bright transition-colors cursor-pointer group">
<div class="flex items-start gap-stack-sm">
<span class="material-symbols-outlined text-primary mt-1">high_quality</span>
<div class="space-y-1">
<h4 class="font-label-lg text-label-lg text-primary group-hover:underline">画质设置？</h4>
<p class="font-body-md text-on-surface-variant text-sm">专业版用户可以选择 4K 导出和不同程度的降噪处理。</p>
</div>
</div>
</div>
</div>
</section>
<!-- 反馈表单 -->
<section class="space-y-stack-md pb-12">
<h3 class="font-label-lg text-label-lg text-primary uppercase tracking-widest flex items-center gap-2">
<span class="w-8 h-[1px] bg-outline-variant"></span>
                提交反馈
            </h3>
<div class="space-y-stack-md">
<div class="wx-input-group border border-outline-variant/30">
<div class="wx-input-item">
<label class="wx-label">问题类型</label>
<select class="wx-input text-on-surface">
<option>功能建议</option>
<option>程序漏洞</option>
<option>支付相关</option>
<option>其他问题</option>
</select>
<span class="material-symbols-outlined text-on-surface-variant/40 text-sm">expand_more</span>
</div>
<div class="wx-input-item flex-col items-start gap-stack-sm">
<label class="wx-label w-full">详细描述</label>
<textarea class="w-full border-none outline-none focus:ring-0 text-sm p-0 text-on-surface placeholder:text-on-surface-variant/40 resize-none" placeholder="请详细描述您遇到的问题或建议..." rows="6"></textarea>
</div>
</div>
<div class="px-2">
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-3.5 rounded-lg shadow-md active:opacity-90 transition-all flex items-center justify-center gap-2">
                        提交反馈
                        <span class="material-symbols-outlined text-lg">send</span>
</button>
</div>
</div>
</section>
<!-- 客服咨询 -->
<section class="bg-tertiary-fixed rounded-2xl p-stack-lg relative overflow-hidden group mb-20">
<div class="absolute inset-0 opacity-10 mix-blend-overlay">
<img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7Ygph-T8FHngJTmsm3sbd_CN9Nv7jWig7VaoF9_5cx6aO7cD1uRVmjcnRod40wKK5FtsZgOzZVq23nQNnekXEbXhhuSdSUMnCFJZEOUk7jc7CGfQLrulisV6au7_zHMSMpSjim0gSkMDN-QgrLHPmXHNqgiryXq8aGNaYw7hbfQTsoBiATz-nDi3_xnQemxyz226JVmWjlO7s-_pp_L2k1eQk8pHysE9u-oOzvGEAS3D2GG-gr103OdAcI0TZYnhYW-KEPOvZeWG_">
</div>
<div class="relative z-10 flex items-center justify-between">
<div class="space-y-1">
<h4 class="font-headline-sm text-headline-sm text-on-tertiary-fixed">需要人工支持？</h4>
<p class="font-body-md text-on-tertiary-fixed-variant">咨询我们的老照片修复专家。</p>
</div>
<button class="bg-tertiary text-on-tertiary px-6 py-2.5 rounded-full font-label-lg text-label-lg flex items-center gap-2 hover:bg-on-tertiary-fixed-variant transition-colors">
<span class="material-symbols-outlined text-sm">chat_bubble</span>
                    在线咨询
                </button>
</div>
</section>
</main>
<footer class="mt-auto h-20"></footer>
</body></html>
