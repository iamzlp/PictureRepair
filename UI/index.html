<style>

            background-color: #fcf9f8;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");

<body class="text-on-background min-h-screen flex flex-col font-body-lg">
<!-- TopAppBar (WeChat Style) -->
<header class="bg-surface-container/80 backdrop-blur-md text-on-surface w-full h-[44px] flex items-center justify-center sticky top-0 z-40 border-b border-outline-variant/20 pt-[env(safe-area-inset-top)]">
<h1 class="text-[17px] font-medium tracking-wide">照片修复</h1>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col px-margin-page py-stack-md gap-stack-md pb-28">
<!-- Hero / Context -->
<section class="text-center mb-2">
<h2 class="text-[22px] font-semibold text-primary mb-2">重温美好回忆</h2>
<p class="font-body-md text-[13px] text-on-surface-variant max-w-sm mx-auto">上传老旧照片，使用先进的AI技术进行修复。</p>
</section>
<!-- Upload Area -->
<section class="relative bg-surface-container-lowest border border-outline-variant/60 rounded-2xl soft-shadow p-6 flex flex-col items-center justify-center text-center">
<div class="bg-primary-container/10 p-4 rounded-full mb-3">
<span class="material-symbols-outlined text-primary text-[36px]" data-icon="cloud_upload">cloud_upload</span>
</div>
<h3 class="text-[16px] font-medium text-primary mb-1">上传照片</h3>
<p class="text-[12px] text-on-surface-variant mb-6">支持 JPG, PNG 格式 (最大10MB)</p>
<div class="flex w-full gap-4 mt-2">
<button class="flex-1 bg-primary text-on-primary text-[15px] font-medium py-3 rounded-full flex items-center justify-center gap-2 hover:bg-primary/90 transition-colors shadow-sm">
<span class="material-symbols-outlined text-[20px]" data-icon="photo_camera">photo_camera</span>
                    拍一张
                </button>
<button class="flex-1 bg-surface-container-lowest text-primary border border-primary text-[15px] font-medium py-3 rounded-full flex items-center justify-center gap-2 hover:bg-surface-variant/50 transition-colors shadow-sm">
<span class="material-symbols-outlined text-[20px]" data-icon="image">image</span>
                    相册导入
                </button>
</div>
</section>
<!-- Core Actions -->
<section class="flex w-full gap-4 mt-2">
<!-- Image Clarity Action - Selected State -->
<button class="flex-1 bg-tertiary text-on-tertiary rounded-2xl px-4 flex flex-col items-center justify-center gap-3 soft-shadow active:scale-[0.98] transition-all py-3">
<span class="text-[15px] font-medium">图片清晰</span>
</button>
<!-- B&W Colorization Action - Unselected State -->
<button class="flex-1 bg-surface-container-lowest text-primary border border-outline-variant/60 rounded-2xl px-4 flex flex-col items-center justify-center gap-3 soft-shadow active:scale-[0.98] transition-all py-3">
<span class="text-[15px] font-medium">黑白上色</span>
</button>
</section>
<!-- How it works -->
<section class="flex flex-col gap-4 mt-2 mb-2 w-full"><textarea class="w-full p-4 rounded-xl bg-surface-container-lowest border border-outline-variant/60 text-[14px] text-on-surface-variant focus:border-primary focus:ring-1 focus:ring-primary min-h-[100px] outline-none transition-all" placeholder="备选，补充修复要求"></textarea><button class="w-full bg-primary text-on-primary text-[16px] font-semibold py-4 rounded-full shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2"><span class="material-symbols-outlined" data-icon="auto_fix_high">auto_fix_high</span>开始修复</button></section><section class="bg-surface-container-lowest border border-outline-variant/60 rounded-2xl soft-shadow p-5 mt-2 flex flex-col items-center gap-4">
<div class="w-full flex justify-between items-center">
<h3 class="text-[15px] font-medium text-primary">修复结果预览</h3>
<span class="text-[12px] text-on-surface-variant">修复完成</span>
</div>
<div class="w-full aspect-[4/3] bg-surface-container-low rounded-xl overflow-hidden flex items-center justify-center border border-outline-variant/20 shadow-inner">
<img alt="修复预览" class="w-full h-full object-cover" src="https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg">
</div><div class="w-full mt-4 space-y-1.5">
  <div class="flex justify-between items-center">
    <span class="text-label-sm text-on-surface-variant font-medium">修复进度</span>
    <span class="text-label-sm text-primary font-bold">80%</span>
  </div>
  <div class="w-full h-2 bg-surface-dim rounded-full overflow-hidden">
    <div class="bg-primary h-full rounded-full" style="width: 80%;"></div>
  </div>
</div>
<div class="flex w-full gap-3">
<button class="flex-1 bg-surface-container-low text-primary text-[14px] font-medium py-2.5 rounded-full border border-outline-variant/40 hover:bg-surface-variant/50 transition-colors shadow-sm">
      查看大图
    </button>
<button class="flex-1 bg-primary text-on-primary text-[14px] font-medium py-2.5 rounded-full hover:bg-primary/90 transition-colors shadow-sm">
      下载高清
    </button>
</div>
</section><section class="bg-surface-container-low rounded-2xl p-5 soft-shadow mt-2">
<h3 class="text-[15px] font-medium text-primary mb-4 pb-2 border-b border-outline-variant/20">操作步骤</h3>
<div class="space-y-4">
<div class="flex items-start gap-4">
<div class="bg-secondary-container text-on-secondary-container w-8 h-8 rounded-full shrink-0 flex items-center justify-center mt-0.5">
<span class="material-symbols-outlined text-[16px]" data-icon="upload_file">upload_file</span>
</div>
<div>
<h4 class="text-[14px] font-medium text-on-surface mb-1">1. 上传照片</h4>
<p class="text-[13px] text-on-surface-variant">从设备中选择一张老旧或破损的照片。</p>
</div>
</div>
<div class="flex items-start gap-4">
<div class="bg-primary-container text-on-primary-container w-8 h-8 rounded-full shrink-0 flex items-center justify-center mt-0.5">
<span class="material-symbols-outlined text-[16px]" data-icon="memory">memory</span>
</div>
<div>
<h4 class="text-[14px] font-medium text-on-surface mb-1">2. AI 智能处理</h4>
<p class="text-[13px] text-on-surface-variant">我们的高级AI将自动分析并修复照片细节。</p>
</div>
</div>
<div class="flex items-start gap-4">
<div class="bg-tertiary-container text-on-tertiary-container w-8 h-8 rounded-full shrink-0 flex items-center justify-center mt-0.5">
<span class="material-symbols-outlined text-[16px]" data-icon="download">download</span>
</div>
<div>
<h4 class="text-[14px] font-medium text-on-surface mb-1">3. 保存与分享</h4>
<p class="text-[13px] text-on-surface-variant">将高清修复后的照片下载保存到您的相册。</p>
</div>
</div>
</div>

</button>
<!-- Inactive Tab: Account -->
<button class="flex flex-col items-center justify-center hover:text-primary transition-all w-16">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="person">person</span>

</button>
